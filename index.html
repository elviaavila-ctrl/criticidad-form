<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evaluación de Criticidad de Posiciones</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#f5f6fa;color:#111827;min-height:100vh;padding:24px 16px}
  .container{max-width:680px;margin:0 auto}
  .header{text-align:center;margin-bottom:28px}
  .header h1{font-size:26px;font-weight:900;color:#111827}
  .header p{font-size:13px;color:#6b7280;margin-top:4px}
  .card{background:#fff;border-radius:14px;padding:24px;border:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
  label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
  select,input[type=text]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;background:#fff;outline:none;font-family:inherit}
  select:focus,input:focus{border-color:#6366f1}
  .btn{width:100%;padding:12px;border-radius:8px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:background .2s}
  .btn-primary{background:#6366f1;color:#fff}
  .btn-primary:disabled{background:#c7d2fe;cursor:not-allowed}
  .btn-add{background:#f3f4f6;color:#374151;border:2px dashed #d1d5db;margin-bottom:16px}
  .badge{background:#eef2ff;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .badge span{font-weight:700;color:#4338ca;font-size:14px}
  .badge a{color:#6b7280;font-size:12px;text-decoration:underline;cursor:pointer;background:none;border:none}
  .position-card{border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:20px;background:#fafafa}
  .position-header{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .position-header .field{flex:1;min-width:180px}
  .btn-remove{background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;align-self:flex-end;white-space:nowrap}
  .progress-wrap{display:flex;align-items:center;gap:8px;margin-bottom:16px}
  .progress-bar{flex:1;height:5px;border-radius:99px;background:#e5e7eb}
  .progress-fill{height:5px;border-radius:99px;background:#6366f1;transition:width .3s}
  .progress-label{font-size:11px;color:#6b7280;white-space:nowrap}
  .section-title{font-weight:700;font-size:11px;color:#6366f1;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:4px;border-bottom:2px solid #e0e7ff}
  .question{margin-bottom:16px}
  .question p{font-size:13px;font-weight:500;color:#111827;margin-bottom:8px}
  .options{display:flex;flex-direction:column;gap:5px}
  .options button,.scale button{padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:400;text-align:left;transition:all .15s;font-family:inherit}
  .options button.active,.scale button.active{border:2px solid #6366f1;background:#eef2ff;color:#4338ca;font-weight:600}
  .scale{display:flex;gap:6px;flex-wrap:wrap}
  .scale button{text-align:center}
  .result{padding:14px;border-radius:10px;margin-top:12px}
  .result .result-top{display:flex;align-items:center;gap:8px}
  .result .dot{width:12px;height:12px;border-radius:50%}
  .result .result-label{font-weight:700;font-size:15px}
  .result .result-score{margin-left:auto;font-weight:700;font-size:14px}
  .result .result-desc{margin-top:5px;font-size:12px;color:#374151}
  .success{text-align:center;padding:32px}
  .success h2{font-size:20px;font-weight:800;color:#111827;margin-bottom:8px}
  .success p{color:#6b7280;font-size:14px}
  .summary-item{padding:12px;border-radius:10px;text-align:left;margin-bottom:8px}
  .summary-item h4{font-weight:700;color:#111827;font-size:14px}
  .summary-item small{color:#6b7280;font-size:12px}
  .summary-item .row{display:flex;justify-content:space-between;margin-top:4px}
  .hint{text-align:center;font-size:11px;color:#9ca3af;margin-top:6px}
  .spinner{display:none;text-align:center;padding:8px;font-size:13px;color:#6366f1}
  .error{color:#dc2626;font-size:12px;margin-top:6px;display:none}
</style>
</head>

    <h1>Evaluación de Criticidad</h1>

const QUESTIONS = [
  {id:"q1",section:"Evaluación de Criticidad",text:"¿Qué tan crítico sería el impacto si esta posición quedara vacante hoy?",type:"scale",labels:["Sin impacto","Impacto leve","Impacto moderado","Impacto alto","Impacto crítico"]},
  {id:"q2",section:"Evaluación de Criticidad",text:"¿Cuánto tiempo podría operar el equipo sin esta posición antes de ver consecuencias significativas?",type:"options",options:[["Más de 1 mes",1],["2–4 semanas",2],["1–2 semanas",3],["Días",4],["Inmediato",5]]},
  {id:"q3",section:"Evaluación de Criticidad",text:"¿Cuántas personas o áreas dependen directamente del trabajo de esta posición?",type:"options",options:[["Solo el propio equipo",1],["1–2 áreas",2],["3–4 áreas",3],["5 o más áreas",4],["Toda la organización",5]]},
  {id:"q4",section:"Evaluación de Criticidad",text:"¿Qué tan difícil sería encontrar un perfil equivalente en el mercado laboral?",type:"scale",labels:["Muy fácil","Fácil","Moderado","Difícil","Muy difícil"]},
  {id:"q5",section:"Evaluación de Criticidad",text:"¿El desempeño de esta posición influye directamente en indicadores de negocio críticos?",type:"scale",labels:["Sin influencia","Influencia mínima","Influencia moderada","Alta influencia","Influencia determinante"]},
];

const CRITICALITY = [
  {min:0,max:9,label:"Baja",color:"#22c55e",bg:"#f0fdf4",desc:"La posición puede gestionarse con los recursos actuales. No requiere acción inmediata."},
  {min:10,max:15,label:"Media",color:"#f59e0b",bg:"#fffbeb",desc:"Existen algunos riesgos. Se recomienda iniciar planes de desarrollo o documentación."},
  {min:16,max:20,label:"Alta",color:"#ef4444",bg:"#fef2f2",desc:"Posición crítica. Requiere plan de sucesión activo y atención prioritaria."},
  {min:21,max:25,label:"Crítica",color:"#7c3aed",bg:"#faf5ff",desc:"Riesgo organizacional significativo. Acción inmediata requerida."},
];

const getCrit = s => CRITICALITY.find(c=>s>=c.min&&s<=c.max)||CRITICALITY[3];

// ─── STATE ───────────────────────────────────────────────────────
let state = {
  step: 0, // 0=intro, 1=form, 2=success
  leaderName: "",
  division: "",
  positions: [{subdivision:"",role:"",answers:{}}],
};

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.step === 0) app.innerHTML = renderIntro();
  else if (state.step === 1) app.innerHTML = renderForm();
  else app.innerHTML = renderSuccess();
  bindEvents();
}

function renderIntro() {
  const divOpts = Object.keys(STRUCTURE).map(d=>`<option value="${d}">${d}</option>`).join("");
  return `
  <div class="card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:18px">Información del Líder</h3>
    <div style="margin-bottom:14px">
      <label>Nombre completo</label>
      <input type="text" id="leaderName" value="${state.leaderName}" placeholder="Tu nombre">
    </div>
    <div style="margin-bottom:22px">
      <label>División</label>
      <select id="division">
        <option value="">Selecciona tu división...</option>
        ${divOpts}
      </select>
    </div>
    <button class="btn btn-primary" id="btnNext" ${!state.leaderName||!state.division?"disabled":""}>Continuar →</button>
  </div>`;
}

function renderForm() {
  const posHtml = state.positions.map((pos,i)=>renderPosition(pos,i)).join("");
  return `
  <div class="badge">
    <span>${state.leaderName} · <span style="color:#6366f1;font-weight:500">${state.division}</span></span>
    <button id="btnBack">Cambiar</button>
  </div>
  ${posHtml}
  <button class="btn btn-add" id="btnAdd">+ Agregar otra posición</button>
  <button class="btn btn-primary" id="btnSubmit" ${allComplete()?"":"disabled"}>Enviar evaluación</button>
  <div class="hint" ${allComplete()?"style='display:none'":""}>Completa todas las preguntas para enviar</div>
  <div class="spinner" id="spinner">Enviando respuestas...</div>
  <div class="error" id="errorMsg">Hubo un error al enviar. Intenta de nuevo.</div>`;
}

function renderPosition(pos, i) {
  const subs = state.division ? Object.keys(STRUCTURE[state.division]||{}) : [];
  const roles = pos.subdivision && STRUCTURE[state.division] ? (STRUCTURE[state.division][pos.subdivision]||[]) : [];
  const subOpts = subs.map(s=>`<option value="${s}" ${pos.subdivision===s?"selected":""}>${s}</option>`).join("");
  const roleOpts = roles.map(r=>`<option value="${r}" ${pos.role===r?"selected":""}>${r}</option>`).join("");
  const answered = QUESTIONS.filter(q=>pos.answers[q.id]!==undefined).length;
  const pct = Math.round((answered/QUESTIONS.length)*100);
  const score = Object.values(pos.answers).reduce((a,b)=>a+b,0);
  const crit = answered===QUESTIONS.length ? getCrit(score) : null;
  const sections = [...new Set(QUESTIONS.map(q=>q.section))];

  return `
  <div class="position-card">
    <div class="position-header">
      <div class="field">
        <label>Subdivisión</label>
        <select data-idx="${i}" data-field="subdivision">
          <option value="">Selecciona subdivisión...</option>
          ${subOpts}
        </select>
      </div>
      <div class="field">
        <label>Posición</label>
        <select data-idx="${i}" data-field="role" ${!pos.subdivision?"disabled":""}>
          <option value="">Selecciona posición...</option>
          ${roleOpts}
        </select>
      </div>
      ${state.positions.length>1?`<button class="btn-remove" data-remove="${i}">Eliminar</button>`:""}
    </div>
    ${pos.role?`
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${answered}/${QUESTIONS.length}</span>
    </div>
    ${sections.map(sec=>`
      <div style="margin-bottom:18px">
        <div class="section-title">${sec}</div>
        ${QUESTIONS.filter(q=>q.section===sec).map(q=>renderQuestion(q,pos,i)).join("")}
      </div>
    `).join("")}
    ${crit?`
    <div class="result" id="result-${i}" style="background:${crit.bg};border:2px solid ${crit.color}">
      <div class="result-top">
        <div class="dot" style="background:${crit.color}"></div>
        <span class="result-label" style="color:${crit.color}">Criticidad ${crit.label}</span>
        <span class="result-score" style="color:${crit.color}">Score: ${score}/25</span>
      </div>
      <div class="result-desc">${crit.desc}</div>
      <button class="btn-explain" data-idx="${i}" style="margin-top:12px;padding:7px 14px;border-radius:8px;background:${crit.color};color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">
        ¿Por qué esta criticidad? →
      </button>
      <div class="explain-loading" id="explain-loading-${i}" style="display:none;margin-top:10px;font-size:13px;color:${crit.color}">Generando explicación...</div>
      <div class="explain-text" id="explain-text-${i}" style="display:none;margin-top:12px;padding:12px;border-radius:8px;background:#fff;border:1px solid ${crit.color};font-size:13px;color:#374151;line-height:1.6"></div>
    </div>`:""}
    `:""}
  </div>`;
}

function renderQuestion(q, pos, i) {
  if (q.type==="scale") {
    const btns = q.labels.map((lbl,j)=>{
      const v=j+1, a=pos.answers[q.id]===v;
      return `<button class="${a?"active":""}" data-idx="${i}" data-qid="${q.id}" data-val="${v}">${v} – ${lbl}</button>`;
    }).join("");
    return `<div class="question"><p>${q.text}</p><div class="scale">${btns}</div></div>`;
  }
  const btns = q.options.map(([lbl,score])=>{
    const a=pos.answers[q.id]===score;
    return `<button class="${a?"active":""}" data-idx="${i}" data-qid="${q.id}" data-val="${score}">${lbl}</button>`;
  }).join("");
  return `<div class="question"><p>${q.text}</p><div class="options">${btns}</div></div>`;
}

function renderSuccess() {
  const items = state.positions.map(pos=>{
    const score = Object.values(pos.answers).reduce((a,b)=>a+b,0);
    const crit = getCrit(score);
    return `
    <div class="summary-item" style="background:${crit.bg};border:2px solid ${crit.color}">
      <h4>${pos.role}</h4>
      <small>${pos.subdivision}</small>
      <div class="row">
        <span style="color:${crit.color};font-weight:600;font-size:13px">Criticidad ${crit.label}</span>
        <span style="color:#6b7280;font-size:12px">Score: ${score}/65</span>
      </div>
    </div>`;
  }).join("");
  return `
  <div class="card success">
    <div style="font-size:44px;margin-bottom:12px">✅</div>
    <h2>Evaluación enviada</h2>
    <p>Gracias <strong>${state.leaderName}</strong> · <strong>${state.division}</strong></p>
    <div style="margin-top:20px;text-align:left">${items}</div>
    <button class="btn btn-primary" id="btnReset" style="margin-top:20px">Nueva evaluación</button>
  </div>`;
}

// ─── HELPERS ─────────────────────────────────────────────────────
function allComplete() {
  return state.leaderName.trim() && state.division &&
    state.positions.every(p=>p.subdivision&&p.role&&Object.keys(p.answers).length===QUESTIONS.length);
}

// ─── EVENTS ──────────────────────────────────────────────────────
function bindEvents() {
  // Intro
  const nameEl = document.getElementById("leaderName");
  const divEl = document.getElementById("division");
  const btnNext = document.getElementById("btnNext");
  if (nameEl) {
    nameEl.addEventListener("input", e=>{state.leaderName=e.target.value; btnNext.disabled=!state.leaderName||!state.division;});
    // restore selected division
    if (divEl) {
      divEl.value = state.division;
      divEl.addEventListener("change", e=>{state.division=e.target.value; btnNext.disabled=!state.leaderName||!state.division;});
    }
    if (btnNext) btnNext.addEventListener("click",()=>{state.step=1;render();});
  }

  const btnBack = document.getElementById("btnBack");
  if (btnBack) btnBack.addEventListener("click",()=>{state.step=0;render();});

  const btnAdd = document.getElementById("btnAdd");
  if (btnAdd) btnAdd.addEventListener("click",()=>{state.positions.push({subdivision:"",role:"",answers:{}});render();});

  const btnSubmit = document.getElementById("btnSubmit");
  if (btnSubmit) btnSubmit.addEventListener("click", submitForm);

  const btnReset = document.getElementById("btnReset");
  if (btnReset) btnReset.addEventListener("click",()=>{state={step:0,leaderName:"",division:"",positions:[{subdivision:"",role:"",answers:{}}]};render();});

  // Explain buttons
  document.querySelectorAll(".btn-explain").forEach(btn => {
    btn.addEventListener("click", async e => {
      const idx = parseInt(e.target.dataset.idx);
      const pos = state.positions[idx];
      const score = Object.values(pos.answers).reduce((a,b)=>a+b,0);
      const crit = getCrit(score);
      const loadEl = document.getElementById(`explain-loading-${idx}`);
      const textEl = document.getElementById(`explain-text-${idx}`);
      btn.style.display = "none";
      loadEl.style.display = "block";

      const answersSummary = QUESTIONS.map(q => {
        const val = pos.answers[q.id];
        const label = q.type === "scale"
          ? `${val} – ${q.labels[val-1]}`
          : q.options.find(([,v]) => v === val)?.[0] || val;
        return `- ${q.text}: ${label}`;
      }).join("\n");

      const prompt = `Eres un experto en gestión del talento y planificación de sucesión.
Un líder evaluó la posición "${pos.role}" de la subdivisión "${pos.subdivision}" con un score de ${score}/25, resultando en criticidad "${crit.label}".

Respuestas del líder:
${answersSummary}

Escribe una explicación breve (3-4 oraciones) en español, dirigida al líder, explicando POR QUÉ esta posición tiene criticidad "${crit.label}" basándote específicamente en sus respuestas. Sé concreto y accionable. No uses bullet points.`;

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{role: "user", content: prompt}]
          })
        });
        const data = await res.json();
        const text = data.content?.[0]?.text || "No se pudo generar la explicación.";
        loadEl.style.display = "none";
        textEl.innerHTML = `<strong style="color:${crit.color}">Análisis:</strong><br>${text}`;
        textEl.style.display = "block";
      } catch {
        loadEl.style.display = "none";
        textEl.innerHTML = "Hubo un error al generar la explicación. Intenta de nuevo.";
        textEl.style.display = "block";
      }
    });
  });

  // Remove position
  document.querySelectorAll("[data-remove]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      const idx=parseInt(e.target.dataset.remove);
      state.positions=state.positions.filter((_,i)=>i!==idx);
      render();
    });
  });

  // Selects for subdivision/role
  document.querySelectorAll("select[data-field]").forEach(sel=>{
    sel.addEventListener("change",e=>{
      const idx=parseInt(e.target.dataset.idx), field=e.target.dataset.field, val=e.target.value;
      if(field==="subdivision") state.positions[idx]={...state.positions[idx],subdivision:val,role:"",answers:{}};
      else state.positions[idx]={...state.positions[idx],role:val,answers:{}};
      render();
    });
  });

  // Answer buttons
  document.querySelectorAll("button[data-qid]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      const idx=parseInt(e.target.dataset.idx), qid=e.target.dataset.qid, val=parseInt(e.target.dataset.val);
      state.positions[idx].answers={...state.positions[idx].answers,[qid]:val};
      render();
    });
  });
}

// ─── SUBMIT ──────────────────────────────────────────────────────
async function submitForm() {
  const spinner = document.getElementById("spinner");
  const errorMsg = document.getElementById("errorMsg");
  const btnSubmit = document.getElementById("btnSubmit");
  spinner.style.display="block";
  errorMsg.style.display="none";
  btnSubmit.disabled=true;

  const timestamp = new Date().toLocaleString("es-MX");
  const rows = state.positions.map(pos=>{
    const score = Object.values(pos.answers).reduce((a,b)=>a+b,0);
    const crit = getCrit(score);
    const answerValues = QUESTIONS.map(q=>pos.answers[q.id]||"");
    return {
      timestamp,
      lider: state.leaderName,
      division: state.division,
      subdivision: pos.subdivision,
      posicion: pos.role,
      score,
      criticidad: crit.label,
      ...Object.fromEntries(QUESTIONS.map((q,i)=>[`Q${i+1}`,answerValues[i]]))
    };
  });

  try {
    await fetch(SHEET_URL, {
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({rows})
    });
    state.step=2;
    render();
  } catch(err) {
    spinner.style.display="none";
    errorMsg.style.display="block";
    btnSubmit.disabled=false;
  }
}

// ─── INIT ────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
